# Render Blueprint — SliceMatic AI backend (ai.main), the Stage-3 conversational
# service (/chat, /voice/*, /api/*). Native Python runtime + uv (no Docker).
#
# Deploy: Render dashboard → New → Blueprint → pick this repo. Render reads this
# file, creates the service, and prompts for the `sync: false` secrets.
#
# Free plan spins down after ~15 min idle. To avoid cold starts (esp. the first
# voice call), point an uptime pinger (e.g. UptimeRobot) at <url>/health every
# 5 min. After deploy: set AI_CORS_ORIGINS to your Vercel URL, and set
# NEXT_PUBLIC_API_BASE on Vercel to this service's URL.
#
# Build uses uv + the committed uv.lock for reproducible, exact versions
# (--frozen). --no-dev skips test/lint tooling. gradio is pulled in as a core
# dep but is never imported by ai.main (build-time cost only).

services:
  - type: web
    name: slicematic-ai
    runtime: python
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    buildCommand: pip install uv && uv sync --frozen --no-dev
    startCommand: uv run uvicorn ai.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Models (safe to commit — not secrets)
      - key: PRIMARY_MODEL
        value: google/gemini-2.5-flash
      - key: FALLBACK_MODEL_1
        value: anthropic/claude-haiku-4.5
      - key: FALLBACK_MODEL_2
        value: openai/gpt-4o-mini
      - key: LANGFUSE_BASE_URL
        value: https://cloud.langfuse.com
      # Secrets + deploy-specific — set these in the Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      # e.g. https://your-app.vercel.app  (comma-separated for multiple)
      - key: AI_CORS_ORIGINS
        sync: false
